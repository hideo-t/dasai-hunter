// Unified API call function
const callAI = async (provider, apiKey, messages, options = {}) => {
  const p = AI_PROVIDERS[provider];
  if (!p) throw new Error("Unknown provider");

  if (provider === "claude") {
    // Anthropic format
    // Anthropic browser access
    const body = {
      model: options.model || p.models[0],
      max_tokens: options.maxTokens || 4000,
      messages: messages.map(m => ({ role: m.role, content: m.content })),
    };
    if (options.system) body.system = options.system;
    if (options.useWebSearch && p.hasWebSearch) {
      body.tools = [{ type: "web_search_20250305", name: "web_search" }];
      body.max_tokens = options.maxTokens || 16000;
    }
    const resp = await fetch(p.endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    // Extract all text from Anthropic response
    return (data.content || [])
      .map(b => {
        if (b.type === "text") return b.text;
        if (b.type === "tool_result" && Array.isArray(b.content))
          return b.content.filter(c => c.type === "text").map(c => c.text).join("\n");
        return "";
      })
      .filter(Boolean)
      .join("\n");
  } else {
    // OpenAI-compatible format (OpenRouter)
    // Anthropic browser access
    const body = {
      model: options.model || p.models[0],
      max_tokens: options.maxTokens || 4000,
      messages: [],
    };
    if (options.system) {
      body.messages.push({ role: "system", content: options.system });
    }
    body.messages.push(...messages.map(m => ({ role: m.role, content: m.content })));

    const headers = {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
      "HTTP-Referer": "https://dasai-hunter.app",
    };
    const resp = await fetch(p.endpoint, {
      method: "POST",
      headers,
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";
  }
};

    const m = cleaned.match(/\[[\s\S]*\]/);
    if (m) {
      try { return JSON.parse(m[0]); } catch {}
      // Try fixing trailing commas
      try { return JSON.parse(m[0].replace(/,\s*([}\]])/g, "$1")); } catch {}

    // Try individual objects
    const objs = [];

            {leads.filter(l => l.nextAction && l.nextDate).length > 0 && (
              <div style={{ marginTop: 20, background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b", marginBottom: 10 }}>⏰ 予定アクション</div>
                {leads.filter(l => l.nextAction && l.nextDate)
                  .sort((a, b) => a.nextDate.localeCompare(b.nextDate))
                  .map(l => (
                    <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12, marginBottom: 6 }}>
                      <span style={{ color: text2, minWidth: 80 }}>{l.nextDate}</span>
                      <span style={{ fontWeight: 700 }}>{l.name}</span>
                      <span style={{ color: text2 }}>— {l.nextAction}</span>
                      <StatusBadge status={l.status} />
                    </div>
                  ))}
              </div>
            )}
          </div>
        )}

        {/* ── JASPA TAB ── */}
        {tab === "jaspa" && (
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4, color: "#10b981" }}>🔧 振興会スキャン</div>
            <div style={{ fontSize: 12, color: text2, marginBottom: 16 }}>整備振興会の会員リストを取得し、各サイトのエラーを自動判定してリード化します</div>

            {/* 都道府県選択 */}
            <div style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: text2, marginBottom: 8 }}>📍 スキャン対象の都道府県</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <select value={jaspaRegion} onChange={e => setJaspaRegion(e.target.value)}
                  style={{ ...inputStyle, width: "auto", minWidth: 140 }}>
                  {JASPA_LIST.map(j => (
                    <option key={j.ken} value={j.ken}>{j.ken}</option>
                  ))}
                </select>
                {getJaspaUrl(jaspaRegion) && (
                  <a href={getJaspaUrl(jaspaRegion).url} target="_blank" rel="noopener"
                    style={{ fontSize: 11, color: "#10b981", textDecoration: "none" }}>
                    🔗 {getJaspaUrl(jaspaRegion).url}
                  </a>
                )}
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={runJaspaScan} disabled={jaspaScanning}
                  style={{ ...btnPrimary, background: "#10b981", flex: 1, opacity: jaspaScanning ? 0.6 : 1 }}>
                  {jaspaScanning && !jaspaManualMode ? jaspaPhase : "🔍 振興会スキャン実行（AI自動取得）"}
                </button>
                <button
                  onClick={() => { setJaspaManualMode(m => !m); setJaspaError(""); }}
                  style={{ background: jaspaManualMode ? "#1e3a5f" : "transparent", color: "#6699cc", border: "1px solid #6699cc44", borderRadius: 6, padding: "10px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                  📝 手動入力
                </button>
              </div>

              {/* 手動入力モード */}
              {jaspaManualMode && (
                <div style={{ marginTop: 12, background: "#0a1628", border: "1px solid #6699cc44", borderRadius: 8, padding: 14 }}>
                  <div style={{ fontSize: 12, color: "#6699cc", fontWeight: 700, marginBottom: 6 }}>📝 手動入力モード — 振興会サイトからコピーした工場リストを貼り付け</div>
                  <div style={{ fontSize: 11, color: text2, marginBottom: 8 }}>
                    1行1工場で入力（タブ・カンマ区切り対応）: <code style={{ background: "#1a1a2e", padding: "2px 6px", borderRadius: 4, fontSize: 11 }}>工場名[TAB]電話番号[TAB]URL</code>
                    <br/>URLは省略可。URLなしの場合はAIがWeb検索で探します。
                  </div>
                  <textarea
                    value={jaspaManualInput}
                    onChange={e => setJaspaManualInput(e.target.value)}
                    placeholder={"西自動車整備工場\t098-xxx-xxxx\nhttp://nishi-auto.com\n東整備工場\t098-yyy-yyyy"}
                    style={{ width: "100%", minHeight: 120, background: "#1a1a2e", border: `1px solid ${border}`, borderRadius: 6, padding: 10, color: text1, fontSize: 12, fontFamily: "monospace", resize: "vertical" }}
                  />
                  <button onClick={runJaspaManual} disabled={jaspaScanning}
                    style={{ ...btnPrimary, background: "#6699cc", marginTop: 8, width: "100%", opacity: jaspaScanning ? 0.6 : 1, fontSize: 13 }}>
                    {jaspaScanning && jaspaManualMode ? jaspaPhase : "🔍 手動リストでURL死活チェック実行"}
                  </button>
                </div>
              )}

              {jaspaError && (
                <div style={{ color: "#f59e0b", fontSize: 12, marginTop: 8, background: "#f59e0b11", borderRadius: 6, padding: "8px 12px", whiteSpace: "pre-line" }}>
                  ⚠️ {jaspaError}
                  {jaspaError.includes("手動入力") && (
                    <button onClick={() => { setJaspaManualMode(true); setJaspaError(""); }}
                      style={{ marginLeft: 12, background: "#6699cc22", border: "1px solid #6699cc", color: "#6699cc", borderRadius: 4, padding: "3px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                      📝 手動入力を開く
                    </button>
                  )}
                </div>
              )}
            </div>

            {jaspaScanning && (
              <div style={{ textAlign: "center", padding: 40, color: text2 }}>
                <div style={{ fontSize: 40, marginBottom: 12, animation: "pulse 1.5s infinite" }}>🔧</div>
                <div style={{ fontSize: 14 }}>{jaspaRegion}の振興会会員をスキャン中...</div>
                <div style={{ fontSize: 13, marginTop: 6, color: "#10b981" }}>{jaspaPhase}</div>
              </div>
            )}

            {jaspaResults.length > 0 && (() => {
              const errOrder = ["ssl","dns","notfound","content_bad","nosite","nosite_none","ok"];
              const sorted = [...jaspaResults].sort((a,b) => errOrder.indexOf(a.errorType) - errOrder.indexOf(b.errorType));
              const counts = {};
              errOrder.forEach(e => { counts[e] = jaspaResults.filter(r => r.errorType === e).length; });

              return (
                <div>
                  {/* サマリー */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8, marginBottom: 16 }}>
                    {errOrder.map(e => {
                      const et = ERROR_TYPES[e];
                      return (
                        <div key={e} style={{ background: card, border: `1px solid ${et.color}33`, borderRadius: 8, padding: "10px 8px", textAlign: "center" }}>
                          <div style={{ fontSize: 20 }}>{et.icon}</div>
                          <div style={{ fontSize: 22, fontWeight: 900, color: et.color }}>{counts[e]}</div>
                          <div style={{ fontSize: 10, color: text2 }}>{et.label}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div style={{ fontSize: 13, fontWeight: 700, color: text2, marginBottom: 10 }}>
                    {jaspaResults.length}件スキャン完了 — 問題あり: {jaspaResults.filter(r => r.errorType !== "ok").length}件
                  </div>

                  {sorted.filter(r => r.errorType !== "ok").map(r => {
                    const et = ERROR_TYPES[r.errorType];
                    const alreadyAdded = leads.find(l => l.phone === r.phone && r.phone);
                    return (
                      <div key={r.id} style={{
                        background: card, border: `1px solid ${et.color}44`,
                        borderLeft: `4px solid ${et.color}`,
                        borderRadius: 10, padding: 14, marginBottom: 8,
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                              <span style={{ fontSize: 16 }}>{et.icon}</span>
                              <span style={{ fontSize: 14, fontWeight: 700 }}>{r.name}</span>
                              <span style={{ fontSize: 11, fontWeight: 700, color: et.color, background: et.color + "18", border: `1px solid ${et.color}44`, borderRadius: 4, padding: "2px 8px" }}>
                                {et.label}
                              </span>
                              {r.certType && r.certType !== "不明" && (() => {
                                const isShitei = r.certType.includes("指定");
                                const cc = isShitei ? "#a78bfa" : "#10b981";
                                return (
                                  <span style={{ fontSize: 10, fontWeight: 700, color: cc, background: cc+"18", border: `1px solid ${cc}44`, borderRadius: 4, padding: "2px 8px" }}>
                                    {isShitei ? "🏆 指定工場" : "🔧 認証工場"}
                                  </span>
                                );
                              })()}
                            </div>
                            {r.url && <div style={{ fontSize: 11, color: "#6699cc", marginBottom: 2 }}>🔗 {r.url}</div>}
                            {r.phone && <div style={{ fontSize: 12, color: text2 }}>📞 {r.phone}</div>}
                            {r.address && <div style={{ fontSize: 11, color: text2 }}>📍 {r.address}</div>}
                            {r.detail && <div style={{ fontSize: 11, color: text2, marginTop: 2 }}>⚠️ {r.detail}</div>}
                            {et.kill && (
                              <div style={{ marginTop: 8, fontSize: 12, color: "#fbbf24", background: "#fbbf2410", borderRadius: 6, padding: "6px 10px", borderLeft: "3px solid #fbbf24" }}>
                                🗡️ 「{et.kill}」
                              </div>
                            )}
                          </div>
                          <button
                            onClick={() => {
                              if (alreadyAdded) return;
                              setLeads(prev => [...prev, {
                                id: uid(), name: r.name, url: r.url || "", phone: r.phone || "",
                                scores: {
                                  responsive: (r.errorType==="nosite"||r.errorType==="nosite_none") ? 0 : r.errorType==="content_bad" ? 15 : 40,
                                  design: r.errorType==="content_bad" ? 10 : 20,
                                  security: r.errorType==="ssl" ? 0 : 40,
                                  integration: 10
                                },
                                dasaiScore: r.errorType==="ssl"||r.errorType==="dns" ? 95
                                  : r.errorType==="nosite_none" ? 100
                                  : r.errorType==="nosite" ? 95
                                  : r.errorType==="content_bad" ? 85
                                  : 80,
                                issues: [et.label + (r.detail ? "："+r.detail : "")],
                                cms: (r.errorType==="nosite"||r.errorType==="nosite_none") ? "サイトなし" : r.errorType==="content_bad" ? "表示異常" : "エラー",
                                cmsRisk: 5, approach: "攻め",
                                approachReason: et.label + "のため即営業推奨",
                                killPhrase: et.kill,
                                opportunity: `振興会会員だが${et.label}の状態`,
                                status: "未着手", memos: [], nextAction: "", nextDate: "",
                                region: r.ken || jaspaRegion, industry: "自動車整備",
                                addedAt: new Date().toISOString(),
                              }]);
                            }}
                            disabled={!!alreadyAdded}
                            style={{ ...btnSecondary, marginLeft: 12, flexShrink: 0, opacity: alreadyAdded ? 0.4 : 1 }}>
                            {alreadyAdded ? "追加済" : "＋ リードに追加"}
                          </button>
                        </div>
                      </div>
                    );
                  })}

                  {sorted.filter(r => r.errorType === "ok").length > 0 && (
                    <details style={{ marginTop: 8 }}>
                      <summary style={{ fontSize: 12, color: text2, cursor: "pointer", padding: "8px 0" }}>
                        ✅ 正常サイト {sorted.filter(r => r.errorType === "ok").length}件（営業対象外）
                      </summary>
                      {sorted.filter(r => r.errorType === "ok").map(r => (
                        <div key={r.id} style={{ fontSize: 12, color: text2, padding: "4px 8px" }}>
                          ✅ {r.name} — {r.url}
                        </div>
                      ))}
                    </details>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── DATA TAB ── */}
        {tab === "data" && (
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: accent }}>💾 データ管理</div>

            {/* Export buttons */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
              <button onClick={() => exportCSV(leads, `leads-${new Date().toISOString().slice(0,10)}.csv`)}
                disabled={leads.length === 0}
                style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center", opacity: leads.length === 0 ? 0.4 : 1 }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>📋</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: text1 }}>リード一覧CSV</div>
                <div style={{ fontSize: 12, color: text2 }}>{leads.length}件のリードを出力</div>
              </button>
              <button onClick={exportScanCSV}
                disabled={scanHistory.length === 0}
                style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center", opacity: scanHistory.length === 0 ? 0.4 : 1 }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>🔍</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: text1 }}>スキャン全履歴CSV</div>
                <div style={{ fontSize: 12, color: text2 }}>{scanHistory.reduce((a, s) => a + ((s.results && s.results.length) || 0), 0)}件の診断データ</div>
              </button>
              <button onClick={() => {
                const json = JSON.stringify({ leads, scanHistory, exportDate: new Date().toISOString() }, null, 2);
                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = `dasai-hunter-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
                URL.revokeObjectURL(url);
              }} style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center" }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>💽</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: text1 }}>全データバックアップ</div>
                <div style={{ fontSize: 12, color: text2 }}>JSON形式で保存</div>
              </button>
            </div>

            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
              {[
                { label: "総スキャン回数", value: scanHistory.length, color: "#3b82f6" },
                { label: "発見した企業", value: scanHistory.reduce((a, s) => a + ((s.results && s.results.length) || 0), 0), color: accent },
                { label: "リード登録", value: leads.length, color: "#f59e0b" },
                { label: "契約済み", value: leads.filter(l => l.status === "契約").length, color: "#10b981" },
              ].map((s, i) => (
                <div key={i} style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 900, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: text2 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Scan History */}
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12, color: text2 }}>📜 スキャン履歴</div>
            {scanHistory.length === 0 && (
              <div style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 40, textAlign: "center", color: text2 }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
                <div>まだスキャン履歴がありません</div>
              </div>
            )}
            {scanHistory.slice().reverse().map(scan => (
              <div key={scan.id} style={{ background: card, border: `1px solid ${border}`, borderRadius: 8, padding: 14, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <span style={{ fontSize: 14, fontWeight: 700 }}>{scan.region} × {scan.industry}</span>
                    <span style={{ fontSize: 12, color: text2, marginLeft: 12 }}>{new Date(scan.date).toLocaleDateString("ja-JP")}</span>
                    <span style={{ fontSize: 11, color: text2, marginLeft: 8 }}>{scan.provider}</span>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, color: accent }}>{scan.count}件</span>
                </div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 6 }}>
                  {(scan.results || []).map((sr, i) => (
                    <span key={i} style={{
                      fontSize: 11, padding: "2px 8px", borderRadius: 4,
                      background: sr.dasaiScore >= 70 ? "#ef444422" : sr.dasaiScore >= 40 ? "#f59e0b22" : "#10b98122",
                      color: sr.dasaiScore >= 70 ? "#ef4444" : sr.dasaiScore >= 40 ? "#f59e0b" : "#10b981",
                    }}>{sr.name} ({sr.dasaiScore})</span>
                  ))}
                </div>
              </div>
            ))}

            {(scanHistory.length > 0 || leads.length > 0) && (
              <div style={{ marginTop: 30, padding: 16, border: "1px solid #ef444444", borderRadius: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#ef4444", marginBottom: 8 }}>⚠️ データリセット</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { if(confirm("スキャン履歴を全て削除しますか？")) setScanHistory([]); }}
                    style={{ background: "transparent", border: "1px solid #ef4444", borderRadius: 6, color: "#ef4444", padding: "6px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                    履歴リセット
                  </button>
                  <button onClick={() => { if(confirm("リードを全て削除しますか？")) { setLeads([]); setSelectedLead(null); } }}
                    style={{ background: "transparent", border: "1px solid #ef4444", borderRadius: 6, color: "#ef4444", padding: "6px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                    リードリセット
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(DasaiHunterSFA), document.getElementById('root'));
</script>
</body>
</html>
