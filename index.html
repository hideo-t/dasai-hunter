// Unified API call function
const callAI = async (provider, apiKey, messages, options = {}) => {
  const p = AI_PROVIDERS[provider];
  if (!p) throw new Error("Unknown provider");

  if (provider === "claude") {
    // Anthropic format
    // Anthropic browser access
    const body = {
      model: options.model || p.models[0],
      max_tokens: options.maxTokens || 4000,
      messages: messages.map(m => ({ role: m.role, content: m.content })),
    };
    if (options.system) body.system = options.system;
    if (options.useWebSearch && p.hasWebSearch) {
      body.tools = [{ type: "web_search_20250305", name: "web_search" }];
      body.max_tokens = options.maxTokens || 16000;
    }
    const resp = await fetch(p.endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    // Extract all text from Anthropic response
    return (data.content || [])
      .map(b => {
        if (b.type === "text") return b.text;
        if (b.type === "tool_result" && Array.isArray(b.content))
          return b.content.filter(c => c.type === "text").map(c => c.text).join("\n");
        return "";
      })
      .filter(Boolean)
      .join("\n");
  } else {
    // OpenAI-compatible format (OpenRouter)
    // Anthropic browser access
    const body = {
      model: options.model || p.models[0],
      max_tokens: options.maxTokens || 4000,
      messages: [],
    };
    if (options.system) {
      body.messages.push({ role: "system", content: options.system });
    }
    body.messages.push(...messages.map(m => ({ role: m.role, content: m.content })));

    const headers = {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`,
      "HTTP-Referer": "https://dasai-hunter.app",
    };
    const resp = await fetch(p.endpoint, {
      method: "POST",
      headers,
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";
  }
};

    if (!text) return [];
    // Remove markdown fences
    const cleaned = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
    // Try full array match
    const m = cleaned.match(/\[[\s\S]*\]/);
    if (m) {
      try { return JSON.parse(m[0]); } catch {}
      // Try fixing trailing commas
      try { return JSON.parse(m[0].replace(/,\s*([}\]])/g, "$1")); } catch {}
    }
    // Try individual objects
    const objs = [];
    const re = /\{[^{}]*"name"[^{}]*\}/g;
    let match;
    while ((match = re.exec(cleaned)) !== null) {
      try { objs.push(JSON.parse(match[0])); } catch {}
    }

  const parseJaspaHtml = (html, baseUrl) => {
    const members = [];
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const seen = new Set();

      doc.querySelectorAll('table').forEach(table => {
        const rows = Array.from(table.querySelectorAll('tr'));
        if (rows.length < 2) return;

        // ヘッダー行でカラム特定
        const hdrs = Array.from(rows[0].querySelectorAll('th,td'))
          .map(c => c.textContent.replace(/\s/g,''));
        const nameIdx = hdrs.findIndex(h => h.match(/事業所|名称/));
        if (nameIdx < 0) return; // 振興会テーブルでない

        const telIdx  = hdrs.findIndex(h => h.match(/TEL|ＴＥＬ|電話/));
        const addrIdx = hdrs.findIndex(h => h.match(/住所|住　所/));
        const certIdx = hdrs.findIndex(h => h.match(/^認証$|^認　証$/));
        const minkIdx = hdrs.findIndex(h => h.match(/民間|車検場/));

        rows.slice(1).forEach(row => {
          const cells = Array.from(row.querySelectorAll('td'));
          if (cells.length <= nameIdx) return;

          const nameCell = cells[nameIdx];
          const nameTxt  = nameCell.textContent.trim();
          if (!nameTxt || nameTxt === '−' || nameTxt === '-' || nameTxt.length < 2) return;
          if (seen.has(nameTxt)) return;
          seen.add(nameTxt);

          // ── 最重要判定：青（URL有）か黒（URL無）か ──
          // 住所セルのGoogleマップリンクは除外し、工場の自社サイトリンクのみ取得
          const shopLink = Array.from(nameCell.querySelectorAll('a')).find(a => {
            const h = (a.getAttribute('href') || '').toLowerCase();
            return h && !h.includes('google') && !h.includes('maps.') &&
                   !h.includes('goo.gl') && !h.startsWith('#') && !h.startsWith('mailto');
          });

          let url = '';
          if (shopLink) {
            url = shopLink.getAttribute('href') || '';
            if (url.startsWith('/')) url = (baseUrl || '') + url;
          }

          const phone   = telIdx  >= 0 && cells[telIdx]  ? cells[telIdx].textContent.trim() : '';
          const address = addrIdx >= 0 && cells[addrIdx] ? cells[addrIdx].textContent.trim() : '';
          const certNo  = certIdx >= 0 && cells[certIdx] ? cells[certIdx].textContent.trim() : '';
          const isMink  = minkIdx >= 0 && cells[minkIdx] ? cells[minkIdx].textContent.includes('民間') : false;

          members.push({
            name:     nameTxt,
            url:      url,
            phone:    phone.replace(/[ー―]/g,'-').replace(/[（）\s　]/g,''),
            address:  address.replace(/\s+/g,''),
            certNo,
            certType: isMink ? '指定工場（民間車検場）' : '認証工場',
            hasLink:  !!shopLink, // true=青（URL有）/ false=黒（URL無）
          });
        });
      });
    } catch(e) { console.warn('DOMParser error:', e); }
    return members;
  };

      const newChecks = {};
      results.forEach(r => {
        const found = parsed.find(p =>
          p.name && (
            r.name.includes(p.name) || p.name.includes(r.name) ||
            (p.jaspaName && (r.name.includes(p.jaspaName) || p.jaspaName.includes(r.name)))
          )
        );
        newChecks[r.id] = found
          ? { isCertified: found.isCertified, certType: found.certType || "不明", jaspaName: found.jaspaName || "", certNo: found.certNo || "", jaspaUrl: jaspaUrl || "" }
          : { isCertified: false, certType: "未確認", jaspaName: "", certNo: "", jaspaUrl: jaspaUrl || "" };
      });
      setCertChecks(newChecks);
    } catch(e) {
      alert(`認証チェックエラー: ${e.message}`);
    }
    setCertChecking(false);
  };

  // ── 地主チェック ──
  const checkLandlord = async (r) => {
    const sm = SEARCH_MODELS[searchModel];
    const searchKey = aiApiKeys[sm.needsKey] || "";
    if (!searchKey) { alert("APIキーを設定してください（⚙️ボタン）"); return; }

    setLandlordChecking(prev => ({ ...prev, [r.id]: true }));

    try {
      const shopName = r.name || "";
      // 名称からキーワードを抽出（例：「仲地自動車整備工場」→「仲地」）
      const nameKeyword = shopName.replace(/自動車整備工場|整備工場|美容院|美容室|歯科|医院|クリニック|薬局|整骨院|整体院|工務店|不動産|株式会社|有限会社|合資会社/g, "").trim().slice(0, 8);

      const prompt = `以下の事業者について、Googleマップや住所情報を調べてください。

事業者名: ${shopName}
電話番号: ${r.phone || "不明"}
地域: ${r.address || ""}

【調査内容】
1. この事業者の正確な住所（番地まで）をGoogleマップで検索
2. 同じ住所・同じ地番に「${nameKeyword}」を含むマンション・ビル・アパート・不動産が存在するか
3. 事業者名の一部（「${nameKeyword}」）と同名の建物・不動産物件があるか

【返答形式】JSONのみ。説明文不要。
{"isLandlord": true/false, "confidence": "高/中/低", "buildingName": "発見した建物名（なければ空文字）", "address": "住所", "reason": "判断理由（1行）"}

同名建物が見つかれば isLandlord: true。見つからなければ false。`;

      const text = await callAI(sm.provider, searchKey,
        [{ role: "user", content: prompt }],
        { model: sm.model, useWebSearch: true, maxTokens: 1000 }
      );

      // JSON抽出
      let result = { isLandlord: false, confidence: "低", buildingName: "", address: "", reason: "情報なし" };
      try {
        const cleaned = text.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
        const m = cleaned.match(/\{[\s\S]*\}/);
        if (m) result = { ...result, ...JSON.parse(m[0]) };
      } catch {}

      setLandlordChecks(prev => ({ ...prev, [r.id]: result }));
    } catch (e) {
      setLandlordChecks(prev => ({ ...prev, [r.id]: { isLandlord: false, confidence: "低", buildingName: "", address: "", reason: `エラー: ${e.message}` } }));
    }
    setLandlordChecking(prev => ({ ...prev, [r.id]: false }));
  };

  const calcDasai = (scores) => {

      return acc + ((100 - s) * c.weight / 100);
    }, 0);
    return Math.round(total);
  };

  // 大目的6項目スコアからダサさスコアを算出
  const calcDasaiFromDaimoku = (d) => {
    if (!d) return 60;
    let total = 0, totalW = 0;
    DAIMOKUTEKI.forEach(({ key, weight }) => {
      total += (d[key] != null ? d[key] : 60) * weight;
      totalW += weight;

    return totalW > 0 ? Math.round(total / totalW) : 60;

  // ── ターゲティングマトリクス分類（仕様書 Sheet1）──
  // 行（工場格）: A=指定, B=認証, C=その他

  const classifyFactory = (name, certType) => {
    const n = (name || '').replace(/\s/g, '');

    // 行：工場格
    const row = (() => {
      if (!certType) return 'B';
      if (certType.includes('指定')) return 'A';
      if (certType.includes('認証')) return 'B';
      return 'C';
    })();

    // 列：IT投資意欲（社名から推定）
    const col = (() => {
      // 1: 大手メーカー系・ディーラー・トラックメーカー
      if (/トヨタ|TOYOTA|toyota|ホンダ|Honda|HONDA|honda|日産|Nissan|NISSAN|スズキ|Suzuki|SUZUKI|ダイハツ|Daihatsu|DAIHATSU|三菱|MITSUBISHI|Mitsubishi|マツダ|Mazda|MAZDA|スバル|Subaru|SUBARU|レクサス|Lexus|LEXUS/.test(n)) return 1;
      // トラックメーカー
      if (/日野|HINO|Hino|いすゞ|イスズ|ISUZU|Isuzu|ふそう|フソウ|FUSO|三菱ふそう|UDトラック|UDトラックス|日デ|ニッサンディーゼル/.test(n)) return 1;
      // 建機・重機メーカー
      if (/コベルコ|KOBELCO|日立建機|Hitachi|HITACHI|コマツ|KOMATSU|Komatsu|キャタピラー|CAT|ヤンマー|YANMAR/.test(n)) return 1;
      // 輸入車ディーラー
      if (/VolksWagen|Volkswagen|VW|ＶＷ|BMW|ベンツ|Mercedes|MERCEDES|アウディ|Audi|AUDI|プジョー|Peugeot|シトロエン|ルノー|Renault|ジャガー|ランドローバー|ポルシェ|Porsche|フェラーリ/.test(n)) return 1;
      // 2: 全国FC・チェーン系（カタカナ・英語ブランド）
      if (/ユーポス|コバック|オートバックス|Auto ?Backs|イエローハット|Yellow ?Hat|ガリバー|Gulliver|GULLIVER|ネクステージ|Neostage|ビッグモーター|Big ?Motor|タイムズカー|Times|ジェームス|James|ライコランド|Raikoland|カーコンビニ|マンガ倉庫|りゅうせき|KANEHIDE|かねひで|コスモ|COSMO|出光|IDEMITSU|Idemitsu|ENEOS|エネオス|ゴープラス|ロータス|LOTAS|コバック/.test(n)) return 2;
      // 全国チェーン整備（英字系）
      if (/AUTOBACS|YELLOW\s?HAT|GULLIVER|NEXTAGE|BIGMOTOR|JAMES|LOTAS/.test(n.toUpperCase())) return 2;
      // 4: 個人・零細の特徴
      // 有限・資・合・名 かつ短い社名
      const stripped = n.replace(/^(有限会社|株式会社|合同会社|合資会社|合名会社|資|有|合|名)[（(]?/, '');
      if (/^[\u4e00-\u9fa5ぁ-んァ-ヶ]{2,5}(モータース?|自動車|整備|オート|ガレージ|ボディ|ボデー|鈑金|板金|電機|電装|商会|工業)/.test(stripped)) return 4;
      // 3文字以下の苗字っぽい社名
      if (/^[\u4e00-\u9fa5]{2,3}(モータース?|自動車|整備工場|オートサービス|ガレージ)$/.test(n)) return 4;
      // 英字のみの短い社名（個人ガレージ系）
      if (/^[A-Za-z\s\.&']{2,12}(GARAGE|MOTOR|AUTO|SERVICE|WORKS|BODY|CRAFT|SHOP)$/i.test(n)) return 4;
      // 3: 地元中堅（デフォルト — 株式会社で地元名、カタカナ社名も含む）
      return 3;
    })();

    // 優先度マッピング（列優先順: 3→2→1→4→5）
    const priorityMap = {
      'A3':1,'B3':1,'C3':1,  // 地元中堅 = 最優先
      'A2':2,'B2':2,'C2':2,  // 全国FC   = 次点
      'A1':3,'B1':3,'C1':3,  // 大手メーカー = 標準（格上で売りにくい）
      'A4':4,'B4':4,'C4':4,  // 個人零細 = 後回し
      'A5':4,'B5':4,'C5':4,  // その他   = 後回し
    };
    const key = `${row}${col}`;
    const priority = priorityMap[key] || 3;

    const priorityColors = { 1: '#c2410c', 2: '#65a30d', 3: '#475569', 4: '#ca8a04' };
    const priorityLabels = { 1: '最優先', 2: '次点', 3: '標準', 4: '後回し' };

    return { row, col, key, priority, color: priorityColors[priority], label: priorityLabels[priority] };
  };

            {jaspaResults.length > 0 && (() => {

              const counts = {};
              errOrder.forEach(e => { counts[e] = jaspaResults.filter(r => r.errorType === e).length; });
              // 問題あり = ok・unconfirmed以外
              const problemCount = jaspaResults.filter(r => r.errorType !== "ok" && r.errorType !== "unconfirmed").length;

              // okでも大目的スコアが高い（要注目）サイト

              const prioritySortScore = r => {
                const p = r._cls ? r._cls.priority : 3;

              const sorted = [...classified].sort((a, b) => prioritySortScore(a) - prioritySortScore(b));

              // マトリクス集計
              const matrixCounts = {};
              const matrixPriority1 = [];
              classified.filter(r => r.errorType !== 'ok' && r.errorType !== 'unconfirmed').forEach(r => {

                          </button>

                          disabled={batchSearching}
                          style={{ background: "#6366f1", color: "#fff", border: "none", borderRadius: 5, padding: "5px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer", opacity: batchSearching ? 0.5 : 1 }}>

                  {(() => {

                    const colLabels = { 1:'大手メーカー系', 2:'全国FC', 3:'地元中堅', 4:'個人零細', 5:'その他' };
                    const priorityColors = {
                      1:'#c2410c', 2:'#65a30d', 3:'#475569', 4:'#ca8a04'
                    };
                    const cellPriority = {
                      A3:1,B3:1,C3:1,
                      A2:2,B2:2,C2:2,
                      A1:3,B1:3,C1:3,

                            <tbody>
                              {rows.map(r => (
                                <tr key={r}>
                                  <td style={{ padding: "4px 8px", color: text2, fontWeight: 700, fontSize: 11, whiteSpace: "nowrap" }}>
                                    {r} {rowLabels[r]}

                                  {cols.map(c => {
                                    const k = `${r}${c}`;
                                    const cnt = matrixCounts[k] || 0;
                                    const pri = cellPriority[k] || 3;
                                    const col = priorityColors[pri];
                                    return (
                                      <td key={c} style={{ padding: "6px 4px", textAlign: "center" }}>
                                        <div style={{
                                          background: cnt > 0 ? col + "22" : "#0a0a14",

                                          padding: "4px 2px",

                        lines.push("=".repeat(60));
                        const errOrder = ["ssl","dns","notfound","content_bad","kakari","nosite_none","ok"];

                          lines.push(`\n【${et.icon} ${et.label}】${items.length}件`);
                          lines.push("-".repeat(40));
                          items.forEach(r => {
                            lines.push(`${r.name}`);
                            if (r.phone)   lines.push(`  TEL: ${r.phone}`);
                            if (r.address) lines.push(`  住所: ${r.address}`);
                            if (r.url)     lines.push(`  URL: ${r.url}`);
                            if (r.certType && r.certType !== "認証工場") lines.push(`  区分: ${r.certType}`);
                            if (r.detail)  lines.push(`  備考: ${r.detail}`);
                            if (r.daimokuteki) {
                              const score = calcDasaiFromDaimoku(r.daimokuteki);
                              lines.push(`  ダサさスコア: ${score}点`);
                            }
                            lines.push("");
                          });
                        });
                        const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = `jaspa-scan-${jaspaRegion}-${new Date().toISOString().slice(0,10)}.txt`;
                        a.click();
                        URL.revokeObjectURL(url);
                      }} style={{ background: "#10b98122", color: "#10b981", border: "1px solid #10b98144", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                        📄 TXT保存
                      </button>
                      <button onClick={() => {
                        const headers = ["工場名","電話","住所","URL","判定","区分","備考","ダサさスコア"];
                        const rows = jaspaResults.map(r => [
                          r.name, r.phone||"", r.address||"", r.url||"",
                          (ERROR_TYPES[r.errorType]||{}).label||r.errorType,
                          r.certType||"", r.detail||"",
                          r.daimokuteki ? calcDasaiFromDaimoku(r.daimokuteki) : "",
                        ]);
                        const bom = "\uFEFF";
                        const csv = bom + [headers, ...rows].map(r => r.map(c => `"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
                        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = `jaspa-scan-${jaspaRegion}-${new Date().toISOString().slice(0,10)}.csv`;
                        a.click();
                        URL.revokeObjectURL(url);
                      }} style={{ background: "#3b82f622", color: "#3b82f6", border: "1px solid #3b82f644", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                        📊 CSV保存
                      </button>

                  {/* ── 処理フロー内訳（分母確認）── */}
                  {(() => {
                    // siteSource が無い場合の fallback 推定
                    const getBucket = (r) => {
                      if (r.siteSource) return r.siteSource;
                      if (r.errorType === "kakari") return "portal";
                      if (r.errorType === "nosite_none") return "none";
                      return (r.url && r.url.trim()) ? "official" : "none";
                    };
                    const total = jaspaResults.length;
                    const official  = jaspaResults.filter(r => getBucket(r) === "official");
                    const gmapRes   = jaspaResults.filter(r => getBucket(r) === "googlemap");
                    const portalRes = jaspaResults.filter(r => getBucket(r) === "portal");
                    const noneRes   = jaspaResults.filter(r => getBucket(r) === "none");
                    const noUrlTotal = gmapRes.length + portalRes.length + noneRes.length;

                    const okOff  = official.filter(r => r.errorType === "ok").length;
                    const badOff = official.filter(r => r.errorType === "content_bad").length;
                    const connOff = okOff + badOff;
                    const errOff  = official.length - connOff;
                    const sslC = official.filter(r => r.errorType === "ssl").length;
                    const dnsC = official.filter(r => r.errorType === "dns").length;
                    const nfC  = official.filter(r => r.errorType === "notfound").length;

                    const okGm  = gmapRes.filter(r => r.errorType === "ok").length;
                    const badGm = gmapRes.filter(r => r.errorType === "content_bad").length;
                    const noMaps = portalRes.length + noneRes.length;

                    const pct = (n, d) => d > 0 ? `${Math.round(n/d*100)}%` : "—";
                    const totalCheck = official.length + noUrlTotal;
                    const hasSiteSource = jaspaResults.some(r => r.siteSource);

                    const R = ({lv, icon, label, n, d, col}) => (
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3, paddingLeft: lv*18, fontSize:12 }}>
                        <span style={{ color:"#374151", fontFamily:"monospace", fontSize:11, flexShrink:0 }}>{"└─"}</span>
                        {icon && <span style={{ fontSize:13 }}>{icon}</span>}
                        <span style={{ color: col || text2, flex:1 }}>{label}</span>
                        <span style={{ fontWeight:900, color: col || "#c0c0d0", minWidth:36, textAlign:"right" }}>{n}件</span>
                        {d > 0 && <span style={{ color:"#6b7280", fontSize:10, minWidth:32, textAlign:"right" }}>{pct(n,d)}</span>}
                      </div>
                    );

                    return (
                      <details style={{ marginBottom:16, background:"#060612", borderRadius:8, padding:"10px 14px", border:`1px solid ${border}` }}>
                        <summary style={{ fontSize:12, fontWeight:700, color:"#9090bb", cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
                          <span>📊 処理フロー内訳（分母確認）</span>
                          <span style={{ color:"#fff", fontWeight:900 }}>総計 {total}件</span>
                          {!hasSiteSource && <span style={{ color:"#f59e0b", fontSize:10, fontWeight:400 }}>※ siteSource未設定 — 推定値</span>}
                        </summary>
                        <div style={{ marginTop:12 }}>

                          {/* URL有り */}
                          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3, fontSize:12 }}>
                            <span style={{ color:"#6699cc", fontWeight:700 }}>├─ 🔗 URL記載あり</span>
                            <span style={{ fontWeight:900, color:"#6699cc" }}>{official.length}件</span>
                            <span style={{ color:"#6b7280", fontSize:10 }}>{pct(official.length, total)}</span>
                          </div>
                          {official.length > 0 && <>
                            <R lv={1} label="接続成功" n={connOff} d={official.length} col="#a0a0c0"/>
                            <R lv={2} icon="✅" label="有益（ok）" n={okOff} d={connOff} col="#10b981"/>
                            <R lv={2} icon="⚠️" label="表示異常（content_bad）" n={badOff} d={connOff} col="#eab308"/>
                            {errOff > 0 && <>
                              <R lv={1} label="接続不能" n={errOff} d={official.length} col="#a0a0c0"/>
                              {sslC > 0 && <R lv={2} icon="🔴" label="SSL失効" n={sslC} d={errOff} col="#ef4444"/>}
                              {dnsC > 0 && <R lv={2} icon="💀" label="ドメイン消滅" n={dnsC} d={errOff} col="#7c3aed"/>}
                              {nfC  > 0 && <R lv={2} icon="🟠" label="404エラー" n={nfC} d={errOff} col="#f97316"/>}
                            </>}
                          </>}

                          {/* URL無し */}
                          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3, marginTop:6, fontSize:12 }}>
                            <span style={{ color:"#a78bfa", fontWeight:700 }}>└─ 🔍 URL記載なし</span>
                            <span style={{ fontWeight:900, color:"#a78bfa" }}>{noUrlTotal}件</span>
                            <span style={{ color:"#6b7280", fontSize:10 }}>{pct(noUrlTotal, total)}</span>
                          </div>
                          {noUrlTotal > 0 && <>
                            <R lv={1} label="Google Maps 発見" n={gmapRes.length} d={noUrlTotal} col="#a0a0c0"/>
                            {gmapRes.length > 0 && <>
                              <R lv={2} icon="✅" label="有益（ok）" n={okGm} d={gmapRes.length} col="#10b981"/>
                              <R lv={2} icon="⚠️" label="表示異常（content_bad）" n={badGm} d={gmapRes.length} col="#eab308"/>
                            </>}
                            <R lv={1} label="Google Maps 未発見" n={noMaps} d={noUrlTotal} col="#a0a0c0"/>
                            {noMaps > 0 && <>
                              <R lv={2} icon="🏚️" label="間借りサイト（kakari）" n={portalRes.length} d={noMaps} col="#a78bfa"/>
                              <R lv={2} icon="🚫" label="完全デジタル不在（nosite_none）" n={noneRes.length} d={noMaps} col="#9ca3af"/>
                            </>}
                          </>}

                          {/* 合計検証 */}
                          <div style={{ marginTop:10, paddingTop:8, borderTop:`1px solid #1e1e3a`, fontSize:11, display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ color:"#6b7280" }}>合計検証:</span>
                            <span style={{ color:"#9090bb" }}>URL有り {official.length} + URL無し {noUrlTotal} = {totalCheck}件</span>
                            {totalCheck !== total
                              ? <span style={{ color:accent }}>⚠️ 総計({total})と{total-totalCheck > 0 ? "+" : ""}{total-totalCheck}件ズレ（siteSource未返却あり）</span>
                              : <span style={{ color:"#10b981" }}>✅ 総計一致</span>
                            }
                          </div>
                        </div>
                      </details>
                    );
                  })()}

                  {sorted.filter(r => r.errorType !== "ok" && r.errorType !== "unconfirmed").map(r => {
                    const et = ERROR_TYPES[r.errorType] || ERROR_TYPES.nosite_none;
                    const cls = r._cls || classifyFactory(r.name, r.certType);
                    const alreadyAdded = leads.find(l => l.phone === r.phone && r.phone);
                    const dasai = r.errorType==="ssl"||r.errorType==="dns" ? 95
                      : r.errorType==="notfound" ? 90
                      : r.errorType==="kakari" ? 88
                      : r.errorType==="content_bad" ? 85
                      : r.errorType==="nosite_none" ? 100 : 80;
                    const scr = r.errorType==="ssl" ? { responsive:30, design:20, security:0, integration:10 }
                      : r.errorType==="kakari" ? { responsive:0, design:10, security:30, integration:20 }
                      : r.errorType==="nosite_none" ? { responsive:0, design:0, security:0, integration:0 }
                      : r.errorType==="content_bad" ? { responsive:15, design:10, security:40, integration:10 }
                      : { responsive:0, design:0, security:0, integration:0 };
                    return (
                      <div key={r.id} style={{
                        background: card, border: `1px solid ${et.color}44`,
                        borderLeft: `4px solid ${et.color}`,
                        borderRadius: 10, padding: 14, marginBottom: 8,
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                              <span style={{ fontSize: 16 }}>{et.icon}</span>
                              <span style={{ fontSize: 14, fontWeight: 700 }}>{r.name}</span>
                              {/* マトリクス分類バッジ */}
                              <span style={{ fontSize: 11, fontWeight: 900, color: cls.color, background: cls.color + "22", border: `2px solid ${cls.color}`, borderRadius: 4, padding: "1px 8px", letterSpacing: 1 }}>
                                {cls.key} {cls.label}
                              </span>
                              <span style={{ fontSize: 11, fontWeight: 700, color: et.color, background: et.color + "18", border: `1px solid ${et.color}44`, borderRadius: 4, padding: "2px 8px" }}>
                                {et.label}
                              </span>
                              {r.siteSource === "googlemap" && (
                                <span style={{ fontSize: 10, color: "#34d399", background: "#34d39918", border: "1px solid #34d39944", borderRadius: 4, padding: "2px 6px" }}>Google Maps発見</span>
                              )}
                              {r.siteSource === "portal" && (
                                <span style={{ fontSize: 10, color: "#a78bfa", background: "#a78bfa18", border: "1px solid #a78bfa44", borderRadius: 4, padding: "2px 6px" }}>🏚️ ポータル経由</span>
                              )}
                              {r.certType && r.certType !== "不明" && (() => {
                                const isShitei = r.certType.includes("指定");
                                const cc = isShitei ? "#a78bfa" : "#10b981";
                                return (
                                  <span style={{ fontSize: 10, fontWeight: 700, color: cc, background: cc+"18", border: `1px solid ${cc}44`, borderRadius: 4, padding: "2px 8px" }}>
                                    {isShitei ? "🏆 指定工場" : "🔧 認証工場"}
                                  </span>
                                );
                              })()}
                            </div>
                            {r.url && <div style={{ fontSize: 11, color: "#6699cc", marginBottom: 2 }}>🔗 <a href={r.url} target="_blank" rel="noopener" style={{ color: "#6699cc" }}>{r.url}</a></div>}
                            {r.phone && <div style={{ fontSize: 12, color: text2 }}>📞 {r.phone}</div>}
                            {r.address && <div style={{ fontSize: 11, color: text2 }}>📍 {r.address}</div>}
                            {r.detail && <div style={{ fontSize: 11, color: text2, marginTop: 2 }}>⚠️ {r.detail}</div>}
                            {et.kill && (
                              <div style={{ marginTop: 8, fontSize: 12, color: "#fbbf24", background: "#fbbf2410", borderRadius: 6, padding: "6px 10px", borderLeft: "3px solid #fbbf24" }}>
                                🗡️ 「{et.kill}」
                              </div>
                            )}
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginLeft: 12, flexShrink: 0 }}>
                            <button
                              onClick={() => {
                                if (alreadyAdded) return;
                                setLeads(prev => [...prev, {
                                  id: uid(), name: r.name, url: r.url || "", phone: r.phone || "",
                                  scores: scr, dasaiScore: dasai,
                                  issues: [et.label + (r.detail ? "："+r.detail : "")],
                                  cms: r.errorType==="nosite_none"||r.errorType==="kakari" ? "サイトなし相当" : r.errorType==="content_bad" ? "表示異常" : "エラー",
                                  cmsRisk: 5, approach: "攻め",
                                  approachReason: et.label + "のため即営業推奨",
                                  killPhrase: et.kill,
                                  opportunity: `振興会会員だが${et.label}の状態`,
                                  status: "未着手", memos: [], nextAction: "", nextDate: "",
                                  region: r.ken || jaspaRegion, industry: "自動車整備",
                                  addedAt: new Date().toISOString(),
                                }]);
                              }}
                              disabled={!!alreadyAdded}
                              style={{ ...btnSecondary, opacity: alreadyAdded ? 0.4 : 1, fontSize: 12 }}>
                              {alreadyAdded ? "追加済" : "＋ リードに追加"}
                            </button>
                            {r.errorType === "nosite_none" && (
                              <button
                                onClick={() => sendToHunt(r.ken || jaspaRegion)}
                                style={{ background: "#f97316", color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                                🎯 通常ハントへ
                              </button>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}

                  {/* ── unconfirmed — 未確認（URL無し）工場リスト ── */}
                  {sorted.filter(r => r.errorType === "unconfirmed").length > 0 && (
                    <details style={{ marginTop: 8, marginBottom: 8 }}>
                      <summary style={{ fontSize: 13, fontWeight: 700, color: "#a5b4fc", cursor: "pointer", padding: "8px 0", display: "flex", alignItems: "center", gap: 8 }}>
                        <span>🔎 未確認（URL無し）{sorted.filter(r => r.errorType === "unconfirmed").length}件</span>
                        <span style={{ fontSize: 11, color: "#6b7280", fontWeight: 400 }}>— 個別に「検索」で確認、または上の一括検索を使用</span>
                      </summary>
                      <div style={{ marginTop: 6 }}>
                        {sorted.filter(r => r.errorType === "unconfirmed").map(r => {
                          const isSearching = searchingIds.has(r.id);
                          return (
                            <div key={r.id} style={{ background: card, border: "1px solid #6366f133", borderLeft: "4px solid #6366f1", borderRadius: 8, padding: "10px 14px", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                              <div>
                                <div style={{ fontSize: 13, fontWeight: 700 }}>{r.name}</div>
                                {r.certType && <span style={{ fontSize: 10, color: r.certType.includes('指定') ? '#a78bfa' : '#10b981' }}>{r.certType.includes('指定') ? '🏆 指定工場' : '🔧 認証工場'}</span>}
                                {r.phone && <div style={{ fontSize: 11, color: text2 }}>📞 {r.phone}</div>}
                                {r.address && <div style={{ fontSize: 11, color: text2 }}>📍 {r.address}</div>}
                              </div>
                              <button onClick={() => searchOneFactory(r)} disabled={isSearching}
                                style={{ background: isSearching ? "#1e1e3a" : "#6366f1", color: "#fff", border: "none", borderRadius: 5, padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer", flexShrink: 0, marginLeft: 12, opacity: isSearching ? 0.6 : 1 }}>
                                {isSearching ? "検索中..." : "🔍 検索"}
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    </details>
                  )}

                  {/* ── ok サイト — 大目的スコアで評価・分類 ── */}
                  {sorted.filter(r => r.errorType === "ok").length > 0 && (() => {
                    const okItems = sorted.filter(r => r.errorType === "ok");
                    const okHigh = okItems.filter(r => calcDasaiFromDaimoku(r.daimokuteki) >= 40);
                    const okLow  = okItems.filter(r => calcDasaiFromDaimoku(r.daimokuteki) < 40);
                    return (
                      <div>
                        {okHigh.length > 0 && (
                          <div style={{ marginTop: 12, marginBottom: 8 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b", marginBottom: 8 }}>
                              ✅ 正常サイトだが大目的スコアで要注目 — {okHigh.length}件
                            </div>
                            {okHigh.map(r => {
                              const score = calcDasaiFromDaimoku(r.daimokuteki);
                              const alreadyAdded = leads.find(l => l.phone === r.phone && r.phone);
                              const issues = r.daimokuteki ? DAIMOKUTEKI.filter(d => (r.daimokuteki[d.key] || 0) >= 60).map(d => d.label) : [];
                              const okScores = r.daimokuteki ? {
                                responsive: 100 - (r.daimokuteki.dasai || 50),
                                design: 100 - (r.daimokuteki.dasai || 50),
                                security: 100 - (r.daimokuteki.broken || 0),
                                integration: 100 - (r.daimokuteki.nosns || 50),
                              } : { responsive: 60, design: 60, security: 80, integration: 60 };
                              return (
                                <div key={r.id} style={{
                                  background: card, border: "1px solid #f59e0b44",
                                  borderLeft: "4px solid #f59e0b",
                                  borderRadius: 10, padding: 14, marginBottom: 8,
                                }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                                    <div style={{ flex: 1 }}>
                                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                                        <span>✅</span>
                                        <span style={{ fontSize: 14, fontWeight: 700 }}>{r.name}</span>
                                        <span style={{ fontSize: 12, fontWeight: 900, color: score >= 70 ? accent : "#f59e0b" }}>ダサさ {score}点</span>
                                        {r.siteSource === "googlemap" && (
                                          <span style={{ fontSize: 10, color: "#34d399", background: "#34d39918", border: "1px solid #34d39944", borderRadius: 4, padding: "2px 6px" }}>Google Maps発見</span>
                                        )}
                                      </div>
                                      {/* 大目的スコアのピル */}
                                      {r.daimokuteki && (
                                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
                                          {DAIMOKUTEKI.map(d => {
                                            const v = r.daimokuteki[d.key] || 0;
                                            if (v < 40) return null;
                                            const c = v >= 80 ? accent : v >= 60 ? "#f59e0b" : "#6b7280";
                                            return (
                                              <span key={d.key} style={{ fontSize: 10, color: c, background: c+"18", border: `1px solid ${c}44`, borderRadius: 4, padding: "2px 6px" }}>
                                                {d.icon} {d.label} {v}
                                              </span>
                                            );
                                          })}
                                        </div>
                                      )}
                                      {r.url && <div style={{ fontSize: 11, color: "#6699cc" }}>🔗 <a href={r.url} target="_blank" rel="noopener" style={{ color: "#6699cc" }}>{r.url}</a></div>}
                                      {r.phone && <div style={{ fontSize: 12, color: text2 }}>📞 {r.phone}</div>}
                                    </div>
                                    <button
                                      onClick={() => {
                                        if (alreadyAdded) return;
                                        setLeads(prev => [...prev, {
                                          id: uid(), name: r.name, url: r.url || "", phone: r.phone || "",
                                          scores: okScores, dasaiScore: score,
                                          issues, cms: "要確認", cmsRisk: 3,
                                          approach: "攻め", approachReason: issues.join("、") + "が改善余地あり",
                                          killPhrase: issues.length > 0 ? `${issues[0]}が改善できれば、競合と差別化できます` : "",
                                          opportunity: `振興会会員。正常サイトだが${issues.join("・")}が弱点`,
                                          status: "未着手", memos: [], nextAction: "", nextDate: "",
                                          region: r.ken || jaspaRegion, industry: "自動車整備",
                                          addedAt: new Date().toISOString(),
                                        }]);
                                      }}
                                      disabled={!!alreadyAdded}
                                      style={{ ...btnSecondary, marginLeft: 12, flexShrink: 0, opacity: alreadyAdded ? 0.4 : 1, fontSize: 12 }}>
                                      {alreadyAdded ? "追加済" : "＋ リードに追加"}
                                    </button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}

                        {okLow.length > 0 && (
                          <details style={{ marginTop: 8 }}>
                            <summary style={{ fontSize: 12, color: text2, cursor: "pointer", padding: "8px 0" }}>
                              ✅ 問題なし（大目的クリア）{okLow.length}件 — 営業優先度低
                            </summary>
                            {okLow.map(r => (
                              <div key={r.id} style={{ fontSize: 12, color: text2, padding: "4px 8px", display: "flex", gap: 8, alignItems: "center" }}>
                                <span>✅</span>
                                <span>{r.name}</span>
                                <a href={r.url} target="_blank" rel="noopener" style={{ color: "#6699cc", fontSize: 11 }}>{r.url}</a>
                                {r.daimokuteki && <span style={{ color: "#10b981", fontSize: 10 }}>ダサさ {calcDasaiFromDaimoku(r.daimokuteki)}点</span>}
                              </div>
                            ))}
                          </details>
                        )}
                      </div>
                    );
                  })()}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── DATA TAB ── */}
        {tab === "data" && (
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: accent }}>💾 データ管理</div>

            {/* Export buttons */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
              <button onClick={() => exportCSV(leads, `leads-${new Date().toISOString().slice(0,10)}.csv`)}
                disabled={leads.length === 0}
                style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center", opacity: leads.length === 0 ? 0.4 : 1 }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>📋</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: text1 }}>リード一覧CSV</div>
                <div style={{ fontSize: 12, color: text2 }}>{leads.length}件のリードを出力</div>
              </button>
              <button onClick={exportScanCSV}
                disabled={scanHistory.length === 0}
                style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center", opacity: scanHistory.length === 0 ? 0.4 : 1 }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>🔍</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: text1 }}>スキャン全履歴CSV</div>
                <div style={{ fontSize: 12, color: text2 }}>{scanHistory.reduce((a, s) => a + ((s.results && s.results.length) || 0), 0)}件の診断データ</div>
              </button>
              <button onClick={() => {
                const json = JSON.stringify({ leads, scanHistory, exportDate: new Date().toISOString() }, null, 2);
                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = `dasai-hunter-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
                URL.revokeObjectURL(url);
              }} style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 20, cursor: "pointer", textAlign: "center" }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>💽</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: text1 }}>全データバックアップ</div>
                <div style={{ fontSize: 12, color: text2 }}>JSON形式で保存</div>
              </button>
            </div>

            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
              {[
                { label: "総スキャン回数", value: scanHistory.length, color: "#3b82f6" },
                { label: "発見した企業", value: scanHistory.reduce((a, s) => a + ((s.results && s.results.length) || 0), 0), color: accent },
                { label: "リード登録", value: leads.length, color: "#f59e0b" },
                { label: "契約済み", value: leads.filter(l => l.status === "契約").length, color: "#10b981" },
              ].map((s, i) => (
                <div key={i} style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 900, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: text2 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Scan History */}
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 12, color: text2 }}>📜 スキャン履歴</div>
            {scanHistory.length === 0 && (
              <div style={{ background: card, border: `1px solid ${border}`, borderRadius: 10, padding: 40, textAlign: "center", color: text2 }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
                <div>まだスキャン履歴がありません</div>
              </div>
            )}
            {scanHistory.slice().reverse().map(scan => (
              <div key={scan.id} style={{ background: card, border: `1px solid ${border}`, borderRadius: 8, padding: 14, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <span style={{ fontSize: 14, fontWeight: 700 }}>{scan.region} × {scan.industry}</span>
                    <span style={{ fontSize: 12, color: text2, marginLeft: 12 }}>{new Date(scan.date).toLocaleDateString("ja-JP")}</span>
                    <span style={{ fontSize: 11, color: text2, marginLeft: 8 }}>{scan.provider}</span>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, color: accent }}>{scan.count}件</span>
                </div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 6 }}>
                  {(scan.results || []).map((sr, i) => (
                    <span key={i} style={{
                      fontSize: 11, padding: "2px 8px", borderRadius: 4,
                      background: sr.dasaiScore >= 70 ? "#ef444422" : sr.dasaiScore >= 40 ? "#f59e0b22" : "#10b98122",
                      color: sr.dasaiScore >= 70 ? "#ef4444" : sr.dasaiScore >= 40 ? "#f59e0b" : "#10b981",
                    }}>{sr.name} ({sr.dasaiScore})</span>
                  ))}
                </div>
              </div>
            ))}

            {(scanHistory.length > 0 || leads.length > 0) && (
              <div style={{ marginTop: 30, padding: 16, border: "1px solid #ef444444", borderRadius: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#ef4444", marginBottom: 8 }}>⚠️ データリセット</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => { if(confirm("スキャン履歴を全て削除しますか？")) setScanHistory([]); }}
                    style={{ background: "transparent", border: "1px solid #ef4444", borderRadius: 6, color: "#ef4444", padding: "6px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                    履歴リセット
                  </button>
                  <button onClick={() => { if(confirm("リードを全て削除しますか？")) { setLeads([]); setSelectedLead(null); } }}
                    style={{ background: "transparent", border: "1px solid #ef4444", borderRadius: 6, color: "#ef4444", padding: "6px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                    リードリセット
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(DasaiHunterSFA), document.getElementById('root'));
</script>
</body>
</html>
